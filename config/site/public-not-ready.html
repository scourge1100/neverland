<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Public link not ready</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f7f4ee;
        color: #18201d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
      }

      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: #666b68;
        line-height: 1.7;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        margin-top: 28px;
        padding: 0 16px;
        border-radius: 8px;
        background: #155e63;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>공개 링크 준비 중</h1>
      <p>Outline에서 포트폴리오 문서를 공개 공유로 만든 뒤 `.env`의 `PUBLIC_PORTFOLIO_URL`에 그 주소를 넣으면 방문하기 버튼이 바로 연결됩니다.</p>
      <a href="/">돌아가기</a>
    </main>
  </body>
</html>
